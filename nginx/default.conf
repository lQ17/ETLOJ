server {
    listen 80;
    server_name etloj.space _;

    client_max_body_size 100m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pet-garden API 代理
    location /pet-garden/api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Pet-garden 静态文件
    location /pet-garden/ {
        alias /var/www/pet-garden/;
        index index.html;
        try_files $uri $uri/ /pet-garden/index.html;
    }

    # AI 聊天接口（SSE 流式，需要长超时）
    location /api/ai/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ETLOJ API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # index.html 不缓存
    location = /index.html {
        root /var/www/etloj;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 带 hash 的静态资源长期缓存（排除 pet-garden 路径）
    location ~* ^/(?!pet-garden/).*\.(js|css|woff2?|ttf|eot|png|jpg|svg|ico)$ {
        root /var/www/etloj;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 兜底
    location / {
        root /var/www/etloj;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
